name: Release SwiftDump

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, and publish
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize release paths
        shell: bash
        run: |
          {
            echo "DERIVED_DATA=$RUNNER_TEMP/SwiftDumpDerivedData"
            echo "RELEASE_DIR=$RUNNER_TEMP/SwiftDumpRelease"
            echo "BUILD_LOG=$RUNNER_TEMP/SwiftDump-build.log"
            echo "REGRESSION_LOG=$RUNNER_TEMP/SwiftDump-regression.log"
            echo "BINARY=$RUNNER_TEMP/SwiftDumpDerivedData/Build/Products/Release/SwiftDump"
          } >> "$GITHUB_ENV"

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          if ! grep -Fq "SDVersion: String = \"$version\"" SwiftDump/SwiftDump/main.swift; then
            echo "SDVersion does not match $tag" >&2
            exit 1
          fi
          if ! grep -Fq "Created by yuxilong." SwiftDump/SwiftDump/main.swift; then
            echo "CLI author signature is not initialized for yuxilong" >&2
            exit 1
          fi

      - name: Build and analyze Release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_DIR"
          {
            echo "===== xcodebuild build ====="
            xcodebuild build \
              -project SwiftDump/SwiftDump.xcodeproj \
              -scheme SwiftDump \
              -configuration Release \
              -destination 'generic/platform=macOS' \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGNING_ALLOWED=NO

            echo "===== xcodebuild analyze ====="
            xcodebuild analyze \
              -project SwiftDump/SwiftDump.xcodeproj \
              -scheme SwiftDump \
              -configuration Release \
              -destination 'generic/platform=macOS' \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGNING_ALLOWED=NO
          } 2>&1 | tee "$BUILD_LOG"

      - name: Verify freshly built binary
        shell: bash
        run: |
          set -euo pipefail
          expected="SwiftDump ${GITHUB_REF_NAME}"
          actual="$("$BINARY" --version)"
          [[ "$actual" == "$expected "* ]]
          [[ "$actual" == *"Created by yuxilong." ]]

          architectures="$(lipo -archs "$BINARY")"
          [[ " $architectures " == *" arm64 "* ]]
          [[ " $architectures " == *" x86_64 "* ]]

      - name: Run Swift 5 and Swift 6 regressions
        shell: bash
        run: |
          set -euo pipefail
          SWIFTDUMP_BIN="$BINARY" ./scripts/run_regression.sh 2>&1 | tee "$REGRESSION_LOG"

      - name: Package signed Universal artifacts
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/package_release.sh \
            "$GITHUB_REF_NAME" \
            "$BINARY" \
            "$BUILD_LOG" \
            "$REGRESSION_LOG" \
            "$RELEASE_DIR"

      - name: Select release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes" ]]; then
            notes="$RUNNER_TEMP/release-notes.md"
            {
              echo "# SwiftDump $GITHUB_REF_NAME"
              echo
              echo "此版本由 GitHub Actions 自动构建、验证并发布。"
              echo
              echo "安装：\`brew install yuxilong/tap/swift-dump\`"
            } > "$notes"
          fi
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES_FILE: ${{ steps.notes.outputs.path }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          assets=(
            "$RELEASE_DIR/SwiftDump-${tag}-macos-universal.zip"
            "$RELEASE_DIR/SwiftDump-${tag}-build.log"
            "$RELEASE_DIR/SwiftDump-${tag}-regression.log"
            "$RELEASE_DIR/SHA256SUMS"
          )

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "SwiftDump $tag" \
              --notes-file "$NOTES_FILE" \
              --latest
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "SwiftDump $tag" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi
